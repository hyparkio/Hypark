<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>IT Кітапханасы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <h1>IT Кітапханасы</h1>
        <div id="library-container" class="book-grid">
            </div>
    </div>

    <script>
        // Бұл — болашақ Firebase/API логикасының негізі
        const libraryData = [
            { id: 1, title: "The Phoenix Project", file: "phoenix.pdf" },
            { id: 2, title: "Kali Linux", file: "kali.pdf" }
        ];

        function renderLibrary(books) {
            const container = document.getElementById('library-container');
            books.forEach(book => {
                container.innerHTML += `
                    <div class="book-card" data-id="${book.id}">
                        <h3>${book.title}</h3>
                        <a href="assets/pdfs/${book.file}" target="_blank">Оқу</a>
                    </div>
                `;
            });
        }
        renderLibrary(libraryData);
    </script>
</body>
</html>
